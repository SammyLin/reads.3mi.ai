name = "news-3mi"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# D1 資料庫
[[d1_databases]]
binding = "DB"
database_name = "news-3mi-db"
database_id = "29ccc16c-4e31-4e56-bbff-b8966623f1f9"

# R2 物件儲存
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "news-3mi-images"
preview_bucket_name = "news-3mi-images-preview"

[vars]
PUBLIC_SITE_URL = "https://news.3mi.ai"
PUBLIC_SITE_NAME = "news.3mi.ai"
PUBLIC_SITE_DESCRIPTION = "Sammy 的 AI 工程筆記 — 架構、工具、實戰"
R2_PUBLIC_URL = "https://images.news.3mi.ai"

# Secrets（用 wrangler secret put 設定，不寫在這裡）
# ADMIN_PASSWORD
# JWT_SECRET